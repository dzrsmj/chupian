<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e8833a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="出片">
<meta name="application-name" content="出片">
<meta name="msapplication-TileImage" content="icons/icon128.png">
<meta name="msapplication-TileColor" content="#e8833a">
<link rel="icon" href="icons/icon48.png">
<link rel="apple-touch-icon" href="icons/icon128.png">
<link rel="manifest" href="manifest.json">
<title>出片 - 分享卡片生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f5;
  --card-bg:#fff;
  --text:#333;
  --sub:#999;
  --border:#e5e5e5;
  --accent:#e8833a;
  --radius:12px;
}
body{
  font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:40px;
}

/* header */
.header{
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);
  color:#fff;
  padding:24px 20px 20px;
  text-align:center;
}
.header h1{font-size:28px;letter-spacing:2px;margin-bottom:4px}
.header p{font-size:13px;opacity:.6}

/* sections */
.section{padding:16px 20px}
.section-label{
  font-size:12px;color:var(--sub);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:10px
}

/* template pills */
.templates{display:flex;gap:8px}
.tpl-btn{
  flex:1;padding:10px 0;border-radius:var(--radius);
  border:1.5px solid var(--border);background:var(--card-bg);
  font-size:14px;cursor:pointer;text-align:center;
  transition:all .2s;color:var(--text)
}
.tpl-btn.active{
  border-color:var(--accent);background:#fff5f0;
  color:var(--accent);font-weight:600
}

/* color dots */
.colors{display:flex;gap:16px;align-items:center}
.color-dot{
  width:32px;height:32px;border-radius:50%;
  cursor:pointer;border:3px solid transparent;
  transition:all .2s;position:relative
}
.color-dot.active{border-color:var(--accent);transform:scale(1.15)}
.color-dot.warm{background:linear-gradient(135deg,#FFF8F0,#FDE8D0)}
.color-dot.cool{background:linear-gradient(135deg,#F0F5FA,#D8EAF5)}
.color-dot.dark{background:linear-gradient(135deg,#1E1E2E,#2A2A3C)}

/* inputs */
#contentInput{
  width:100%;min-height:100px;padding:14px;border-radius:var(--radius);
  border:1.5px solid var(--border);font-size:15px;line-height:1.6;
  font-family:inherit;resize:vertical;background:var(--card-bg)
}
#contentInput:focus{outline:none;border-color:var(--accent)}
#contentInput::placeholder{color:#ccc}
.opt-inputs{display:flex;gap:10px;margin-top:10px}
.opt-inputs input{
  flex:1;padding:10px 14px;border-radius:var(--radius);
  border:1.5px solid var(--border);font-size:14px;
  font-family:inherit;background:var(--card-bg)
}
.opt-inputs input:focus{outline:none;border-color:var(--accent)}
.opt-inputs input::placeholder{color:#ccc}

/* preview */
.preview-wrap{
  display:flex;justify-content:center;padding:0 20px
}
#cardCanvas{
  max-width:100%;height:auto;cursor:pointer;
  box-shadow:0 4px 24px rgba(0,0,0,.12);
  border-radius:8px
}
#cardCanvas:active{opacity:.9}

/* actions */
.actions{
  display:flex;gap:12px;padding:0 20px;margin-top:12px
}
.btn{
  flex:1;padding:14px 0;border-radius:var(--radius);
  border:none;font-size:15px;font-weight:600;cursor:pointer;
  transition:all .2s;text-align:center
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:#d4722a}
.btn-secondary{background:var(--card-bg);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:active{background:#f0f0f0}
.btn.copied{background:#4CAF50!important;color:#fff!important}

/* install banner */
.install-banner{
  display:none;margin:0 20px 16px;padding:14px 18px;
  border-radius:var(--radius);background:#fff5f0;
  border:1px solid #fde8d0;gap:12px;align-items:center
}
.install-banner.show{display:flex}
.install-banner .msg{flex:1;font-size:14px;color:var(--accent)}
.install-banner button{
  padding:8px 18px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer
}

/* tip */
.tip{
  text-align:center;padding:8px 20px;
  font-size:12px;color:var(--sub)
}
.tip span{color:var(--accent)}

/* modal */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:999;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
.modal-overlay.show{display:flex}
.modal-overlay img{max-width:90vw;max-height:65vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.modal-overlay .modal-hint{color:#fff;font-size:14px;margin-top:20px;text-align:center;line-height:1.8}
.modal-overlay .modal-close{
  margin-top:16px;padding:10px 40px;border-radius:24px;border:1.5px solid #fff;
  background:transparent;color:#fff;font-size:15px;cursor:pointer
}
</style>
</head>
<body>

<div class="header">
  <h1>出 片</h1>
  <p>输入文字，一键生成精美分享卡片</p>
</div>

<div id="installBanner" class="install-banner">
  <span class="msg">添加到主屏幕，使用更方便</span>
  <button id="installBtn">添加</button>
</div>

<div class="section">
  <div class="section-label">模板</div>
  <div class="templates">
    <button class="tpl-btn active" data-tpl="quote">金句卡片</button>
    <button class="tpl-btn" data-tpl="product">产品推荐卡</button>
    <button class="tpl-btn" data-tpl="article">文章分享卡</button>
  </div>
</div>

<div class="section">
  <div class="section-label">色调</div>
  <div class="colors">
    <div class="color-dot warm active" data-color="warm"></div>
    <div class="color-dot cool" data-color="cool"></div>
    <div class="color-dot dark" data-color="dark"></div>
    <span style="font-size:13px;color:var(--sub);margin-left:4px" id="colorLabel">暖色调</span>
  </div>
</div>

<div class="section">
  <div class="section-label">内容</div>
  <textarea id="contentInput" placeholder="粘贴或输入文字……&#10;&#10;金句卡：输入你要分享的句子&#10;产品卡：第一行是产品名，下面写描述&#10;文章卡：输入文章摘要或要点"></textarea>
  <div class="opt-inputs">
    <input id="sourceTitle" placeholder="来源标题（可选）">
    <input id="sourceUrl" placeholder="来源链接（可选）">
  </div>
</div>

<div class="preview-wrap">
  <canvas id="cardCanvas"></canvas>
</div>

<div class="tip">点按上方卡片可查看大图，<strong>长按即可保存</strong></div>

<div class="actions">
  <button class="btn btn-primary" id="downloadBtn">保存 PNG</button>
  <button class="btn btn-secondary" id="copyBtn">复制图片</button>
</div>
<div class="tip">「复制图片」可粘贴到聊天、文档、PPT 等应用中，不能直接粘贴为文件</div>

<div class="modal-overlay" id="previewModal">
  <img id="previewImg" src="" alt="卡片预览">
  <div class="modal-hint">长按图片 → 保存到相册<br>或截图分享</div>
  <button class="modal-close" id="modalClose">关闭</button>
</div>

<script>
// ── state ──
let template = 'quote';
let color = 'warm';
const canvas = document.getElementById('cardCanvas');
const ctx = canvas.getContext('2d');

const themes = {
  warm:{bg:'#FFF8F0',text:'#3D2C1E',accent:'#E8833A',sub:'#8B6F5A',tag:'#FDE8D0'},
  cool:{bg:'#F0F5FA',text:'#1E3040',accent:'#3A7DB8',sub:'#5A7A8B',tag:'#D8EAF5'},
  dark:{bg:'#1E1E2E',text:'#F0EAD6',accent:'#D4A853',sub:'#A09888',tag:'#2A2A3C'}
};
const W = 800, PAD = 60, FOOTER_H = 56;
const colorLabels = {warm:'暖色调',cool:'冷色调',dark:'深色'};

// ── helpers ──
function wrapText(text,maxW){
  if(!text)return[''];
  const paras = text.split('\n');
  const all = [];
  paras.forEach(p => {
    if(!p.trim()){all.push('');return}
    let line='';
    for(const ch of p){
      if(ctx.measureText(line+ch).width>maxW){all.push(line);line=ch}
      else line+=ch;
    }
    if(line)all.push(line);
  });
  return all;
}
function roundRect(x,y,w,h,r,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);ctx.closePath();ctx.fill();
}
function drawSource(t,y){
  const src = sourceTitle()||sourceUrl()||'';
  if(!src)return;
  ctx.fillStyle=t.sub;ctx.font='16px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(src.length>30?src.slice(0,30)+'…':src,PAD,y);
}
function drawFooter(t,y){
  ctx.fillStyle=t.sub;ctx.font='13px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('用「出片」生成',W-PAD-ctx.measureText('用「出片」生成').width,y);
}

// ── getters ──
function contentText(){return document.getElementById('contentInput').value.trim()}
function sourceTitle(){return document.getElementById('sourceTitle').value.trim()}
function sourceUrl(){return document.getElementById('sourceUrl').value.trim()}

// ── renderers ──
function renderQuote(t){
  const text = contentText()||'输入你的金句';
  ctx.font='bold 36px "PingFang SC","Microsoft YaHei",sans-serif';
  const qLines = wrapText(text,W-PAD*2-40);
  ctx.font='18px "PingFang SC","Microsoft YaHei",sans-serif';
  const srcLabel = sourceTitle()?'— '+sourceTitle():'';

  const topDeco=60, quoteStart=160, quoteH=qLines.length*54;
  const srcGap=40, srcH=srcLabel?24:0;
  const bottomLineY=quoteStart+quoteH+srcGap+srcH+30;
  canvas.height=bottomLineY+20+FOOTER_H+10;

  ctx.fillStyle=t.bg;ctx.fillRect(0,0,W,canvas.height);
  roundRect(PAD-4,topDeco,12,108,6,t.accent);

  ctx.fillStyle=t.text;ctx.font='bold 36px "PingFang SC","Microsoft YaHei",sans-serif';
  qLines.forEach((l,i)=>ctx.fillText(l,PAD+40,quoteStart+i*54));

  if(srcLabel){
    ctx.fillStyle=t.sub;ctx.font='18px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(srcLabel,PAD+40,quoteStart+quoteH+srcGap+srcH);
  }
  roundRect(PAD,bottomLineY,W-PAD*2,2,1,t.accent);
  drawFooter(t,bottomLineY+20);
}

function renderProduct(t){
  const allLines = contentText().split('\n')||['未命名产品'];
  const title = allLines.find(l=>l.trim())||'未命名产品';
  const titleIdx = allLines.indexOf(title);
  const descLines = allLines.slice(titleIdx+1);

  const tagY=50,tagH=34;
  ctx.font='bold 32px "PingFang SC","Microsoft YaHei",sans-serif';
  const tl=wrapText(title.length>30?title.slice(0,30)+'…':title,W-PAD*2);
  const titleStart=tagY+tagH+44,titleH=tl.length*42;

  ctx.font='18px "PingFang SC","Microsoft YaHei",sans-serif';
  const maxDescW=W-PAD*2;
  let descH=0;
  const rd=[];let prevWasContent=false;
  descLines.forEach(line=>{
    const trimmed=line.trim();
    if(!trimmed){if(prevWasContent){rd.push({text:'',isBreak:true});prevWasContent=false}return}
    if(prevWasContent)rd.push({text:'',isBreak:true});
    wrapText(trimmed,maxDescW).forEach(l=>{rd.push({text:l,isBreak:false})});
    prevWasContent=true;
  });
  while(rd.length>0&&rd[rd.length-1].isBreak)rd.pop();
  rd.forEach(l=>{descH+=l.isBreak?14:28});

  const descStart=titleStart+titleH+(descLines.length>0?16:0);
  const dividerY=descStart+descH+24,srcY=dividerY+10+20;
  canvas.height=srcY+28+FOOTER_H;

  ctx.fillStyle=t.bg;ctx.fillRect(0,0,W,canvas.height);
  roundRect(PAD,tagY,110,tagH,17,t.tag);
  ctx.fillStyle=t.accent;ctx.font='bold 16px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('产品推荐',PAD+16,tagY+23);

  ctx.fillStyle=t.text;ctx.font='bold 32px "PingFang SC","Microsoft YaHei",sans-serif';
  tl.forEach((l,i)=>ctx.fillText(l,PAD,titleStart+i*42));

  if(rd.length>0){
    ctx.fillStyle=t.sub;ctx.font='18px "PingFang SC","Microsoft YaHei",sans-serif';
    let yOff=0;
    rd.forEach(l=>{
      if(l.isBreak)yOff+=14;
      else{ctx.fillText(l.text,PAD,descStart+yOff+22);yOff+=28}
    });
  }
  roundRect(PAD,dividerY,W-PAD*2,2,1,t.accent);
  drawSource(t,srcY);
  drawFooter(t,canvas.height-FOOTER_H+20);
}

function renderArticle(t){
  const dispTitle=sourceTitle()||'未命名页面';
  ctx.font='bold 30px "PingFang SC","Microsoft YaHei",sans-serif';
  const tl=wrapText(dispTitle.length>35?dispTitle.slice(0,35)+'…':dispTitle,W-PAD*2);
  const titleStart=68,titleH=tl.length*42;

  ctx.font='20px "PingFang SC","Microsoft YaHei",sans-serif';
  const excerpt=contentText()||'';
  const el=wrapText(excerpt.length>200?excerpt.slice(0,200)+'…':excerpt,W-PAD*2);
  const excerptStart=titleStart+titleH+24,excerptH=el.length*32;

  const dividerY=excerptStart+excerptH+24,urlY=dividerY+10+18;
  canvas.height=urlY+28+FOOTER_H;

  ctx.fillStyle=t.bg;ctx.fillRect(0,0,W,canvas.height);
  ctx.fillStyle=t.accent;ctx.fillRect(0,0,W,8);

  ctx.fillStyle=t.text;ctx.font='bold 30px "PingFang SC","Microsoft YaHei",sans-serif';
  tl.forEach((l,i)=>ctx.fillText(l,PAD,titleStart+i*42));

  ctx.fillStyle=t.sub;ctx.font='20px "PingFang SC","Microsoft YaHei",sans-serif';
  el.forEach((l,i)=>ctx.fillText(l,PAD,excerptStart+i*32));

  roundRect(PAD,dividerY,W-PAD*2,2,1,t.accent);
  ctx.fillStyle=t.sub;ctx.font='15px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(sourceUrl()||'',PAD,urlY);
  drawFooter(t,canvas.height-FOOTER_H+20);
}

function render(){
  const t=themes[color];
  canvas.width=W;
  if(template==='quote')renderQuote(t);
  else if(template==='product')renderProduct(t);
  else renderArticle(t);
}

// ── debounced render ──
let renderTimer;
function scheduleRender(){
  clearTimeout(renderTimer);
  renderTimer=setTimeout(render,200);
}

// ── actions ──
function download(){
  const a=document.createElement('a');
  a.download='出片_'+Date.now()+'.png';
  a.href=canvas.toDataURL('image/png');a.click();
}
async function copyCard(){
  try{
    const blob=await new Promise((res,rej)=>{
      canvas.toBlob(b=>b?res(b):rej(new Error('blob failed')),'image/png');
    });
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    return 'ok';
  }catch(e){
    // mobile: try Web Share API (works without secure context on some browsers)
    try{
      const blob=await new Promise((res,rej)=>{
        canvas.toBlob(b=>b?res(b):rej(new Error('blob failed')),'image/png');
      });
      const file=new File([blob],'出片_'+Date.now()+'.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'出片分享卡片'});
        return 'shared';
      }
    }catch(e2){}
    return 'fallback';
  }
}
async function doCopy(){
  const btn=document.getElementById('copyBtn');
  const orig=btn.textContent;
  const result=await copyCard();
  if(result==='ok'){
    btn.textContent='✓ 已复制';
    btn.classList.add('copied');
  }else if(result==='shared'){
    btn.textContent='已分享';
    btn.classList.add('copied');
  }else{
    btn.textContent='复制失败';
    showPreviewModal();
  }
  setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied')},1500);
}

function showPreviewModal(){
  document.getElementById('previewImg').src=canvas.toDataURL('image/png');
  document.getElementById('previewModal').classList.add('show');
}
document.getElementById('modalClose').addEventListener('click',()=>{
  document.getElementById('previewModal').classList.remove('show');
});
document.getElementById('previewModal').addEventListener('click',function(e){
  if(e.target===this)this.classList.remove('show');
});

// ── UI bindings ──
document.querySelectorAll('.tpl-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    template=btn.dataset.tpl;
    render();
  });
});
document.querySelectorAll('.color-dot').forEach(dot=>{
  dot.addEventListener('click',()=>{
    document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active'));
    dot.classList.add('active');
    color=dot.dataset.color;
    document.getElementById('colorLabel').textContent=colorLabels[color];
    render();
  });
});
document.getElementById('contentInput').addEventListener('input',scheduleRender);
document.getElementById('sourceTitle').addEventListener('input',scheduleRender);
document.getElementById('sourceUrl').addEventListener('input',scheduleRender);
document.getElementById('downloadBtn').addEventListener('click',download);
document.getElementById('copyBtn').addEventListener('click',doCopy);
canvas.addEventListener('click',showPreviewModal);

// ── share target: pre-fill from incoming share ──
const sp=new URLSearchParams(location.search);
if(sp.get('text')){
  document.getElementById('contentInput').value=sp.get('text')||'';
}
if(sp.get('title')){
  document.getElementById('sourceTitle').value=sp.get('title')||'';
}
if(sp.get('url')){
  document.getElementById('sourceUrl').value=sp.get('url')||'';
}

// ── PWA install ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  if(outcome==='accepted')document.getElementById('installBanner').classList.remove('show');
  deferredPrompt=null;
});

// ── service worker ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

// ── initial render ──
render();
</script>
</body>
</html>
